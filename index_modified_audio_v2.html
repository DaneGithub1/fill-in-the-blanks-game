<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>BlankD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root{
  --bg:#0c0c10;
  --bg2:#121218;
  --surface:#1a1a23;
  --surface2:#20202c;
  --surface3:#252530;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --text:#f2f2f8;
  --muted:#8b8b9e;
  --faint:#5a5a6e;
  --accent:#6c6fff;
  --accent2:#9b9dff;
  --accent-glow:rgba(108,111,255,.28);
  --gold:#f0c355;
  --gold-soft:rgba(240,195,85,.15);
  --gold-glow:rgba(240,195,85,.3);
  --good:#3dd68c;
  --good-soft:rgba(61,214,140,.12);
  --warn:#f5a623;
  --warn-soft:rgba(245,166,35,.12);
  --bad:#f5607a;
  --bad-soft:rgba(245,96,122,.12);
  --purple:#b06fff;
  --r:20px;
  --r-lg:28px;
  --r-xl:36px;
  --app:430px;
  --topbar:56px;
  --tabbar:72px;
  --safe-top:max(16px,env(safe-area-inset-top));
  --safe-bottom:max(16px,env(safe-area-inset-bottom));
  --font:'Inter',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
/* CLASSIC LIGHT */
body[data-theme="classic"],body:not([data-theme]),body[data-theme="default"]{
  --bg:#f0ede8;--bg2:#e8e4de;--surface:#ffffff;--surface2:#f7f4ef;--surface3:#eeeae4;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--text:#18171f;--muted:#6e6d7a;--faint:#a0a0b0;
  --accent:#4e52e8;--accent2:#7f82ff;--accent-glow:rgba(78,82,232,.2);
}
body[data-theme="paper"]{
  --bg:#f5f0e4;--bg2:#ede7d8;--surface:#fffef8;--surface2:#f7f0e2;--surface3:#ede6d4;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--text:#1e1a0e;--muted:#7a6e56;--faint:#b0a48c;
  --accent:#8a6020;--accent2:#b8882a;--accent-glow:rgba(138,96,32,.2);
}
body[data-theme="midnight"]{
  --bg:#0d0f1a;--bg2:#111420;--surface:#171a27;--surface2:#1e2130;--surface3:#242837;
  --accent:#7ca4ff;--accent2:#a8bfff;--accent-glow:rgba(124,164,255,.28);
  --good:#3dd68c;--gold:#ffca5f;--bad:#ff7d7d;
}
body[data-theme="glacier"]{
  --bg:#eaf4fd;--bg2:#deeef9;--surface:#ffffff;--surface2:#f2f9ff;--surface3:#e4f2fc;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--text:#0d1e2d;--muted:#607285;--faint:#8ba0b4;
  --accent:#2e74dd;--accent2:#5e97f6;--accent-glow:rgba(46,116,221,.2);
}
body[data-theme="nebula"]{
  --bg:#150e1f;--bg2:#1a1227;--surface:#20173a;--surface2:#271e44;--surface3:#2d234e;
  --accent:#ae88ff;--accent2:#d0b4ff;--accent-glow:rgba(174,136,255,.28);
  --good:#4bd49b;--gold:#ffd35d;
}
body[data-theme="velvet"]{
  --bg:#1a0d12;--bg2:#22121a;--surface:#2a1820;--surface2:#331e28;--surface3:#3a2330;
  --accent:#ff8faf;--accent2:#ffb3cc;--accent-glow:rgba(255,143,175,.28);
  --good:#62d7a2;--gold:#ffd26f;
}
body[data-theme="monolith"]{
  --bg:#111111;--bg2:#181818;--surface:#1e1e1e;--surface2:#252525;--surface3:#2c2c2c;
  --accent:#c7c7c2;--accent2:#e0e0db;--accent-glow:rgba(199,199,194,.2);
  --good:#59c98d;--gold:#e1c16c;
}
body[data-theme="eclipse"]{
  --bg:#0a0e1c;--bg2:#0f1428;--surface:#141a34;--surface2:#1b2240;--surface3:#22294e;
  --accent:#90b4ff;--accent2:#b8d0ff;--accent-glow:rgba(144,180,255,.28);
  --good:#52d6a0;--gold:#ffcf6d;
}
body[data-theme="royal"]{
  --bg:#f5f0f8;--bg2:#ede6f4;--surface:#ffffff;--surface2:#f8f2ff;--surface3:#ede6f8;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--text:#1a1022;--muted:#7a6888;--faint:#b0a0be;
  --accent:#8444cf;--accent2:#aa78f0;--accent-glow:rgba(132,68,207,.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--body);overscroll-behavior:none;height:100%;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;-webkit-font-smoothing:antialiased}
input{font-family:var(--body)}
a{text-decoration:none;color:inherit}
.hidden{display:none!important}

/* APP SHELL */
.app{
  width:min(100vw,var(--app));
  height:100dvh;
  margin:0 auto;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

/* TOP RESOURCE BAR */
.topbar{
  position:relative;
  z-index:20;
  flex:0 0 auto;
  padding:var(--safe-top) 14px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.brand-mark{
  font-family:var(--font);
  font-weight:900;
  font-size:1.3rem;
  letter-spacing:-.06em;
  line-height:1;
  color:var(--text);
  display:flex;
  align-items:center;
  flex:0 0 auto;
  padding:6px 0;
}
.brand-mark .d{color:var(--accent)}
.topbar-resources{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:flex-end;
  flex:0 0 auto;
  margin-left:auto;
}
.res-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-height:42px;
  padding:0 12px;
  border-radius:999px;
  background:var(--surface2);
  border:1px solid var(--border);
  font-family:var(--font);
  font-size:.75rem;
  font-weight:800;
  line-height:1;
  letter-spacing:.02em;
}
.res-chip .ic{font-size:.9rem}
.res-chip.xp{color:var(--accent2);border-color:var(--accent-glow)}
.res-chip.ink-c{color:var(--gold)}
.res-chip.str-c{color:var(--accent)}

.lang-panel{
  display:grid;
  gap:14px;
}
.lang-card{
  background:linear-gradient(180deg,var(--surface),var(--surface2));
  border:1px solid var(--border);
  border-radius:24px;
  padding:18px;
  box-shadow:var(--shadow);
}
.lang-card-title{
  font-family:var(--font);
  font-size:1.18rem;
  font-weight:900;
  letter-spacing:-.04em;
  margin-bottom:6px;
}
.lang-card-sub{
  color:var(--muted);
  font-size:.92rem;
  line-height:1.45;
}
.lang-options{
  display:grid;
  gap:12px;
  margin-top:14px;
}
.lang-choice{
  width:100%;
  text-align:left;
  padding:16px 18px;
  border-radius:18px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.lang-choice.active{
  border-color:var(--accent);
  background:color-mix(in srgb,var(--surface2) 65%,var(--accent) 35%);
  box-shadow:0 10px 24px var(--accent-glow);
}
.settings-stack{display:grid;gap:12px;margin-top:10px}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:18px;border:1px solid var(--border);background:linear-gradient(180deg,var(--surface2),var(--surface3))}
.settings-copy{display:flex;align-items:center;gap:10px;min-width:0}
.settings-k{font-family:var(--font);font-size:.98rem;font-weight:900;letter-spacing:-.03em}
.settings-v{display:none}
.sound-toggle{display:inline-flex;align-items:center;gap:6px;padding:5px;background:var(--surface3);border:1px solid var(--border);border-radius:999px;flex:0 0 auto}
.sound-opt{min-width:52px;height:38px;padding:0 14px;border-radius:999px;font-family:var(--font);font-size:.78rem;font-weight:900;letter-spacing:.04em;color:var(--muted)}
.sound-opt.active{background:var(--accent);color:#fff;box-shadow:0 8px 18px var(--accent-glow)}
.settings-icon{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--surface3);border:1px solid var(--border);font-size:1rem;flex:0 0 auto}
.lang-choice-copy{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.lang-choice-k{
  font-family:var(--font);
  font-size:1rem;
  font-weight:900;
  letter-spacing:-.03em;
}
.lang-choice-v{
  color:var(--muted);
  font-size:.86rem;
}
.lang-choice-mark{
  font-family:var(--font);
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.12em;
  color:var(--faint);
  text-transform:uppercase;
}
.lang-choice.active .lang-choice-mark{
  color:#fff;
}

/* MAIN CONTENT */
.main-content{
  flex:1 1 auto;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative;
}
.main-content::-webkit-scrollbar{display:none}

/* TAB CONTENT */
.tab-panel{
  display:none;
  min-height:100%;
  padding:14px 14px calc(var(--safe-bottom) + var(--tabbar) + 20px);
}
.tab-panel.active{display:block}

/* BOTTOM TAB BAR */
.tabbar{
  position:relative;
  z-index:20;
  flex:0 0 auto;
  display:flex;
  align-items:stretch;
  background:var(--surface);
  border-top:none;
  padding-bottom:var(--safe-bottom);
  height:calc(var(--tabbar) + var(--safe-bottom));
}
.tab-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:6px 4px;
  position:relative;
  transition:opacity .15s;
  color:var(--faint);
}
.tab-btn.active{color:var(--accent)}
.tab-btn .t-icon{font-size:1.46rem;line-height:1;display:block}
.tab-btn .t-label{
  display:none;
}
.tab-btn::before{
  content:'';
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:0;height:2px;
  background:var(--accent);
  border-radius:0 0 2px 2px;
  transition:width .2s cubic-bezier(.16,1,.3,1);
}
.tab-btn.active::before{width:28px}
.badge{
  position:absolute;
  top:4px;right:50%;
  transform:translateX(8px);
  min-width:16px;height:16px;
  border-radius:999px;
  background:var(--bad);
  color:#fff;
  font-size:.6rem;
  font-weight:900;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
  border:2px solid var(--surface);
}

/* ─── CAREER / HOME SCREEN ─── */
#homePanel{padding-top:10px}
.chapter-nav{
  display:flex;
  gap:8px;
  padding:0 0 12px;
  overflow-x:auto;
  scrollbar-width:none;
}
.chapter-nav::-webkit-scrollbar{display:none}
.ch-pill{
  flex:0 0 auto;
  padding:7px 14px;
  border-radius:999px;
  background:var(--surface2);
  border:1px solid var(--border);
  font-family:var(--font);
  font-size:.72rem;
  font-weight:800;
  color:var(--muted);
  white-space:nowrap;
  transition:all .15s;
}
.ch-pill.active{background:var(--accent);color:#fff;border-color:transparent}
.ch-pill.done{border-color:var(--accent);color:var(--accent)}

/* Current focus hero card */
.focus-card{
  border-radius:var(--r-lg);
  background:linear-gradient(135deg,var(--surface2),var(--surface));
  border:1px solid var(--border2);
  padding:20px;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
}
.focus-card::before{
  content:'';
  position:absolute;
  top:-40%;right:-20%;
  width:260px;height:260px;
  background:radial-gradient(circle,var(--accent-glow),transparent 65%);
  pointer-events:none;
}
.focus-label{
  font-family:var(--font);
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:8px;
}
.focus-title{
  font-family:var(--font);
  font-size:1.5rem;
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.1;
  margin-bottom:4px;
}
.focus-sub{
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:14px;
  line-height:1.4;
}
.focus-meta{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.meta-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 10px;
  border-radius:999px;
  background:var(--surface3);
  border:1px solid var(--border);
  font-family:var(--font);
  font-size:.68rem;
  font-weight:800;
  color:var(--muted);
}
.play-btn{
  width:100%;
  padding:16px;
  border-radius:var(--r);
  background:var(--accent);
  color:#fff;
  font-family:var(--font);
  font-size:1.05rem;
  font-weight:900;
  letter-spacing:-.01em;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 6px 24px var(--accent-glow);
  transition:transform .12s, box-shadow .12s, opacity .12s;
}
.play-btn:active{transform:scale(.97);box-shadow:0 2px 8px var(--accent-glow)}
.play-btn.locked{background:var(--surface3);color:var(--faint);box-shadow:none}
.stars-bar{display:flex;gap:4px;align-items:center;margin-top:10px}
.s{font-size:1.2rem;opacity:.25}
.s.on{opacity:1;filter:drop-shadow(0 2px 6px var(--gold-glow))}

/* Level map path */
.level-path{
  display:grid;
  gap:10px;
}
.level-node{
  display:grid;
  grid-template-columns:52px 1fr;
  gap:12px;
  align-items:center;
  cursor:pointer;
  position:relative;
}
.level-node::before{
  content:'';
  position:absolute;
  left:25px;bottom:-10px;
  width:2px;height:10px;
  background:var(--border2);
  pointer-events:none;
}
.level-node:last-child::before{display:none}
.node-btn{
  width:52px;height:52px;
  border-radius:50%;
  border:2px solid var(--border2);
  background:var(--surface2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font);
  font-size:.95rem;
  font-weight:900;
  color:var(--muted);
  position:relative;
  transition:all .15s;
  flex:0 0 52px;
}
.node-btn.done{
  background:var(--accent);
  border-color:transparent;
  color:#fff;
  box-shadow:0 4px 14px var(--accent-glow);
}
.node-btn.current{
  background:var(--surface);
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-glow);
  transform:scale(1.06);
}
.node-btn.perfect{
  background:var(--gold);
  border-color:transparent;
  color:#000;
  box-shadow:0 4px 14px var(--gold-glow);
}
.node-btn.locked{
  opacity:.45;
  cursor:default;
}
.node-info{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px 14px;
  transition:border-color .15s;
}
.node-info.current-info{border-color:var(--accent);background:linear-gradient(135deg,var(--surface),var(--surface2))}
.node-name{
  font-family:var(--font);
  font-weight:800;
  font-size:.92rem;
  letter-spacing:-.02em;
  margin-bottom:2px;
}
.node-sub-text{
  font-size:.75rem;
  color:var(--muted);
  line-height:1.3;
  margin-bottom:6px;
}
.node-tags{display:flex;gap:5px;flex-wrap:wrap}
.nt{
  padding:3px 8px;
  border-radius:999px;
  background:var(--surface2);
  font-size:.62rem;
  font-weight:700;
  color:var(--muted);
}
.node-stars{display:flex;gap:3px;margin-left:auto}
.ns{font-size:.9rem;opacity:.2}
.ns.on{opacity:1}

/* ─── MODES PANEL ─── */
.modes-grid{
  display:grid;
  gap:10px;
}
.mode-card{
  border-radius:var(--r-lg);
  background:var(--surface);
  border:1px solid var(--border);
  padding:18px;
  display:flex;
  gap:16px;
  align-items:center;
  cursor:pointer;
  transition:border-color .15s, box-shadow .15s;
  position:relative;
  overflow:hidden;
}
.mode-card:active{transform:scale(.99)}
.mode-card.locked-card{opacity:.55}
.mode-icon{
  width:52px;height:52px;
  border-radius:18px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
  flex:0 0 52px;
}
.mode-body{flex:1;min-width:0}
.mode-name{
  font-family:var(--font);
  font-weight:900;
  font-size:1rem;
  letter-spacing:-.03em;
  margin-bottom:3px;
}
.mode-desc{font-size:.8rem;color:var(--muted);line-height:1.35}
.mode-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mc{
  padding:3px 8px;
  border-radius:999px;
  background:var(--surface2);
  font-size:.62rem;
  font-weight:800;
  color:var(--muted);
  font-family:var(--font);
}
.mode-arrow{
  font-size:1.2rem;
  color:var(--faint);
  flex:0 0 auto;
}
.lock-overlay-chip{
  position:absolute;
  top:14px;right:14px;
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:4px 10px;
  font-size:.62rem;
  font-weight:900;
  color:var(--faint);
  font-family:var(--font);
}

/* ─── SHOP PANEL ─── */
.shop-currency{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}
.curr-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
}
.curr-amount{
  font-family:var(--font);
  font-size:1.4rem;
  font-weight:900;
  letter-spacing:-.04em;
}
.curr-label{
  font-size:.68rem;
  color:var(--muted);
  font-weight:700;
  margin-top:2px;
}
.shop-section-title{
  font-family:var(--font);
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--faint);
  margin:16px 0 10px;
}
.shop-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.shop-tile{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .15s;
}
.shop-tile:active{transform:scale(.98)}
.shop-tile.owned{border-color:var(--accent)}
.shop-tile-icon{font-size:1.8rem;margin-bottom:8px;display:block}
.shop-tile-name{
  font-family:var(--font);
  font-weight:800;
  font-size:.85rem;
  letter-spacing:-.02em;
  margin-bottom:3px;
}
.shop-tile-price{
  font-size:.72rem;
  color:var(--muted);
  font-weight:700;
}
.shop-tile-price.can-buy{color:var(--gold)}
.owned-badge{
  position:absolute;
  top:8px;right:8px;
  background:var(--accent);
  color:#fff;
  font-size:.55rem;
  font-weight:900;
  padding:2px 6px;
  border-radius:999px;
  font-family:var(--font);
}
.active-badge{
  position:absolute;
  top:8px;right:8px;
  background:var(--good);
  color:#fff;
  font-size:.55rem;
  font-weight:900;
  padding:2px 6px;
  border-radius:999px;
  font-family:var(--font);
}
.locked-req{
  font-size:.62rem;
  color:var(--bad);
  font-weight:700;
  margin-top:2px;
}
.shop-list-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:8px;
  cursor:pointer;
  transition:border-color .15s;
}
.shop-list-item.owned{border-color:var(--accent)}
.sli-icon{
  width:46px;height:46px;
  border-radius:14px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  flex:0 0 46px;
}
.sli-body{flex:1;min-width:0}
.sli-name{
  font-family:var(--font);
  font-weight:800;
  font-size:.92rem;
  letter-spacing:-.02em;
}
.sli-desc{font-size:.75rem;color:var(--muted);margin-top:2px;line-height:1.3}
.sli-action{flex:0 0 auto}
.action-btn{
  padding:8px 14px;
  border-radius:999px;
  font-family:var(--font);
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.02em;
  transition:all .12s;
}
.action-btn:active{transform:scale(.95)}
.action-btn.primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px var(--accent-glow)}
.action-btn.secondary{background:var(--surface2);border:1px solid var(--border2);color:var(--text)}
.action-btn.success{background:var(--good-soft);color:var(--good);border:1px solid rgba(61,214,140,.3)}
.action-btn.dim{background:var(--surface2);color:var(--faint);cursor:not-allowed}

/* ─── ACHIEVEMENTS PANEL ─── */
.ach-header{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:18px;
  margin-bottom:14px;
}
.ach-progress-bar{
  height:8px;
  background:var(--surface3);
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.ach-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--purple));
  border-radius:999px;
  transition:width .6s cubic-bezier(.16,1,.3,1);
}
.ach-cat-title{
  font-family:var(--font);
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--faint);
  margin:16px 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.ach-cat-count{
  font-family:var(--font);
  font-size:.7rem;
  font-weight:800;
  color:var(--muted);
}
.ach-item{
  display:flex;
  gap:12px;
  align-items:center;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px 14px;
  margin-bottom:8px;
  transition:border-color .15s;
}
.ach-item.unlocked{border-color:var(--gold)}
.ach-icon-box{
  width:40px;height:40px;
  border-radius:12px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  flex:0 0 40px;
  filter:grayscale(1) opacity(.4);
}
.ach-item.unlocked .ach-icon-box{filter:none}
.ach-body{flex:1;min-width:0}
.ach-name{font-family:var(--font);font-weight:800;font-size:.87rem;letter-spacing:-.02em}
.ach-desc{font-size:.73rem;color:var(--muted);margin-top:2px;line-height:1.3}
.ach-tick{
  font-size:1rem;
  color:var(--gold);
  flex:0 0 auto;
  opacity:0;
}
.ach-item.unlocked .ach-tick{opacity:1}

/* ─── GAME SCREEN ─── */
#gameScreen{
  position:absolute;
  inset:0;
  z-index:50;
  display:none;
  flex-direction:column;
  background:var(--bg);
}
#gameScreen.show{display:flex}
.game-topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:10px;
  padding:var(--safe-top) 14px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.game-back-btn{
  width:40px;height:40px;
  border-radius:12px;
  background:var(--surface2);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
  flex:0 0 40px;
}
.game-back-btn:active{transform:scale(.93)}
.game-mode-info{flex:1;min-width:0;text-align:center}
.game-mode-label{
  font-family:var(--font);
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--faint);
}
.game-level-name{
  font-family:var(--font);
  font-size:.95rem;
  font-weight:900;
  letter-spacing:-.03em;
  color:var(--text);
}
.game-score{
  font-family:var(--font);
  font-size:1.1rem;
  font-weight:900;
  color:var(--accent);
  letter-spacing:-.03em;
}
/* Round track */
.round-track{
  display:flex;
  gap:4px;
  padding:10px 14px;
  flex:0 0 auto;
}
.rd{
  flex:1;
  height:5px;
  border-radius:999px;
  background:var(--surface3);
  transition:background .2s;
}
.rd.curr{background:var(--accent);opacity:.6}
.rd.correct{background:var(--good)}
.rd.almost{background:var(--warn)}
.rd.wrong,.rd.timeout{background:var(--bad)}
/* Timer */
.timer-bar-wrap{
  padding:0 14px 10px;
  flex:0 0 auto;
}
.timer-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}
.timer-label{font-size:.7rem;color:var(--muted);font-weight:600}
.timer-num{
  font-family:var(--font);
  font-size:.9rem;
  font-weight:900;
  color:var(--text);
}
.timer-num.warn{color:var(--warn)}
.timer-num.bad{color:var(--bad)}
.timer-track{
  height:8px;
  border-radius:999px;
  background:var(--surface3);
  overflow:hidden;
}
.timer-fill{
  height:100%;
  border-radius:999px;
  transition:width .15s linear, background .2s;
}
/* Game content area (scrollable) */
.game-content{
  flex:1 1 auto;
  overflow-y:auto;
  overflow-x:hidden;
  padding:10px 14px;
  -webkit-overflow-scrolling:touch;
}
.game-content::-webkit-scrollbar{display:none}
/* Question card */
.question-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:18px;
  margin-bottom:10px;
}
.q-context{
  font-size:.78rem;
  color:var(--accent2);
  font-weight:700;
  margin-bottom:10px;
  letter-spacing:.04em;
  font-family:var(--font);
}
.q-text{
  font-family:var(--font);
  font-size:1.35rem;
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.25;
  color:var(--text);
}
.q-blank{
  display:inline-block;
  min-width:60px;
  border-bottom:3px solid var(--accent);
  color:var(--accent);
  padding:0 4px 2px;
  vertical-align:bottom;
}
/* Answer display */
.answer-display{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:14px;
  align-items:center;
}
.ac{
  width:34px;
  min-width:34px;
  max-width:34px;
  height:34px;
  padding:0;
  border-radius:10px;
  border:1px solid var(--border2);
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--body);
  font-weight:800;
  font-size:.8rem;
  line-height:1;
  color:var(--faint);
  transition:background .2s,border-color .2s,box-shadow .2s,transform .2s,color .2s;
  overflow:hidden;
  flex:0 0 34px;
}
.ac.revealed{
  background:rgba(108,111,255,.15);
  border-color:var(--accent);
  color:var(--accent2);
}
.ac.filled{
  color:var(--text);
  background:var(--surface3);
  border-color:var(--border2);
  transform:translateY(0);
}
.ac.result-good,.ac.result-warn,.ac.result-bad{
  color:#fff;
  animation:answerRevealPop 420ms cubic-bezier(.18,.9,.22,1);
}
.ac.result-good{background:var(--good);border-color:rgba(61,214,140,.5);box-shadow:0 10px 20px rgba(61,214,140,.18)}
.ac.result-warn{background:var(--warn);border-color:rgba(245,166,35,.5);box-shadow:0 10px 20px rgba(245,166,35,.16)}
.ac.result-bad{background:var(--bad);border-color:rgba(245,96,122,.5);box-shadow:0 10px 20px rgba(245,96,122,.16)}
.ac.sp{width:10px;min-width:10px;max-width:10px;flex:0 0 10px;border:none;background:transparent}
@keyframes answerRevealPop{
  0%{opacity:.2;transform:translateY(8px) scale(.84)}
  55%{opacity:1;transform:translateY(-3px) scale(1.06)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
/* Hint/feedback */
.helper-area{
  background:var(--surface);
  border-radius:var(--r);
  padding:12px 14px;
  margin-bottom:10px;
  font-size:.83rem;
  font-weight:600;
  line-height:1.4;
  display:none;
}
.helper-area.show{display:block}
.helper-area.good{background:var(--good-soft);color:var(--good);border:1px solid rgba(61,214,140,.3)}
.helper-area.warn{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(245,166,35,.3)}
.helper-area.bad{background:var(--bad-soft);color:var(--bad);border:1px solid rgba(245,96,122,.3)}
/* Input display */
.input-display{
  background:var(--surface);
  border:2px solid var(--border2);
  border-radius:var(--r);
  padding:14px 16px;
  margin-bottom:10px;
  min-height:52px;
  display:flex;
  align-items:center;
  font-family:var(--font);
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:.04em;
  color:var(--text);
  transition:border-color .15s;
}
.input-display.active-input{border-color:var(--accent)}
.input-display .cursor{
  display:inline-block;
  width:2px;height:1.1em;
  background:var(--accent);
  margin-left:2px;
  animation:blink 1s step-end infinite;
  vertical-align:text-top;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.assist-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}
.assist-btn{
  padding:12px;
  border-radius:var(--r);
  background:var(--surface);
  border:1px solid var(--border);
  font-family:var(--font);
  font-size:.75rem;
  font-weight:900;
  color:var(--muted);
  letter-spacing:.02em;
  transition:all .12s;
}
.assist-btn:active{transform:scale(.97)}
.assist-btn:disabled{opacity:.4;cursor:default}
.next-btn{
  width:100%;
  padding:17px;
  border-radius:var(--r);
  background:var(--accent);
  color:#fff;
  font-family:var(--font);
  font-size:1rem;
  font-weight:900;
  box-shadow:0 4px 16px var(--accent-glow);
  margin-bottom:10px;
  display:none;
  transition:all .12s;
}
.next-btn:active{transform:scale(.98)}
.next-btn.show{display:none}
/* Custom keyboard */
.custom-kb{
  flex:0 0 auto;
  padding:9px 8px calc(var(--safe-bottom) + 8px);
  background:var(--surface);
  border-top:1px solid var(--border);
}
.kb-row{
  display:flex;
  gap:5px;
  justify-content:center;
  margin-bottom:4px;
}
.kb-row.space-row{
  justify-content:center;
  margin-top:4px;
}
.k{
  flex:1 1 0;
  max-width:58px;
  min-width:0;
  height:50px;
  border-radius:12px;
  background:var(--surface2);
  border:1px solid var(--border2);
  font-family:var(--body);
  font-size:1.22rem;
  font-weight:700;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  transition:all .08s;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
.k:active{transform:scale(.95);background:var(--accent);color:#fff;border-color:transparent}
.k.wide{max-width:none;flex:1;font-size:.82rem;font-weight:700;letter-spacing:.06em;padding:0 12px}
.k.spacebar{flex:0 1 29%;width:min(29%,118px);max-width:118px;height:34px;font-size:.6rem;letter-spacing:.1em;padding:0 10px}
.k.action{background:var(--accent);color:#fff;border-color:transparent;font-size:.88rem}
.k.action:active{background:color-mix(in srgb,var(--accent) 80%,black)}
.k.backspace{background:var(--surface3);flex:1.45 1 0;max-width:90px;font-size:1.3rem}
.kb-submit{
  width:100%;
  padding:15px;
  border-radius:var(--r);
  background:var(--accent);
  color:#fff;
  font-family:var(--font);
  font-size:1rem;
  font-weight:900;
  box-shadow:0 4px 16px var(--accent-glow);
  margin-top:8px;
  display:none;
  transition:all .12s;
}
.kb-submit.show{display:block}
.kb-submit:active{transform:scale(.98)}

@media (max-width:430px){
  .custom-kb{padding:7px 5px calc(var(--safe-bottom) + 6px)}
  .kb-row{gap:4px;margin-bottom:4px}
  .k{max-width:56px;height:46px;font-size:1.1rem;border-radius:10px}
  .k.backspace{max-width:78px;font-size:1.24rem}
  .k.spacebar{width:min(31%,118px);max-width:118px;height:34px;font-size:.58rem}
}

/* Overlays */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  z-index:100;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}
.overlay.show{opacity:1;pointer-events:all}
.sheet{
  width:min(100%,var(--app));
  max-height:82dvh;
  overflow-y:auto;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r-xl) var(--r-xl) 20px 20px;
  padding:20px 20px calc(var(--safe-bottom) + 20px);
  animation:slideUp .25s cubic-bezier(.16,1,.3,1) both;
}
.sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{opacity:1;transform:none}}
.sheet-eyebrow{
  font-family:var(--font);
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:6px;
}
.sheet-title{
  font-family:var(--font);
  font-size:1.7rem;
  font-weight:900;
  letter-spacing:-.05em;
  line-height:1;
  margin-bottom:6px;
}
.sheet-sub{font-size:.85rem;color:var(--muted);line-height:1.4;margin-bottom:16px}
.sheet-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}
.stat-box{
  background:var(--surface2);
  border-radius:var(--r);
  padding:12px;
  border:1px solid var(--border);
}
.stat-k{font-size:.62rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:4px;font-family:var(--font)}
.stat-v{font-family:var(--font);font-size:1.1rem;font-weight:900;letter-spacing:-.03em}
.rule-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.rule-chip{
  padding:5px 10px;
  border-radius:999px;
  background:var(--surface2);
  border:1px solid var(--border);
  font-size:.7rem;
  font-weight:700;
  color:var(--muted);
}
.sheet-actions{display:grid;gap:8px;margin-top:8px}
.btn-primary{
  width:100%;
  padding:16px;
  border-radius:var(--r);
  background:var(--accent);
  color:#fff;
  font-family:var(--font);
  font-size:1rem;
  font-weight:900;
  box-shadow:0 6px 20px var(--accent-glow);
  transition:all .12s;
}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.45;box-shadow:none}
.btn-secondary{
  width:100%;
  padding:14px;
  border-radius:var(--r);
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:var(--font);
  font-size:.9rem;
  font-weight:800;
  transition:all .12s;
}
.btn-secondary:active{transform:scale(.98)}
.btn-ghost{
  width:100%;
  padding:14px;
  border-radius:var(--r);
  background:transparent;
  color:var(--muted);
  font-family:var(--font);
  font-size:.9rem;
  font-weight:800;
  transition:all .12s;
}
.sheet-x{
  float:right;
  width:32px;height:32px;
  border-radius:999px;
  background:var(--surface2);
  border:1px solid var(--border);
  font-size:.85rem;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);
  cursor:pointer;
}

/* End screen */
#endScreen{
  position:absolute;
  inset:0;
  z-index:60;
  display:none;
  flex-direction:column;
  background:var(--bg);
  overflow-y:auto;
}
#endScreen::-webkit-scrollbar{display:none}
#endScreen.show{display:flex}
.end-top{
  flex:0 0 auto;
  padding:var(--safe-top) 14px 14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.end-hero{
  margin:0 14px 14px;
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);
  border-radius:var(--r-xl);
  padding:22px;
  position:relative;
  overflow:hidden;
}
.end-hero::before{
  content:'';
  position:absolute;
  top:-40%;right:-20%;
  width:260px;height:260px;
  background:radial-gradient(circle,var(--accent-glow),transparent 65%);
  pointer-events:none;
}
.end-eyebrow{
  font-family:var(--font);
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:8px;
}
.end-title{
  font-family:var(--font);
  font-size:2rem;
  font-weight:900;
  letter-spacing:-.05em;
  line-height:1;
  margin-bottom:6px;
}
.end-sub{font-size:.85rem;color:var(--muted);line-height:1.4;margin-bottom:14px}
.end-stars{display:flex;gap:8px;margin-bottom:14px}
.es{font-size:2rem;opacity:.2;transition:all .3s}
.es.on{opacity:1;filter:drop-shadow(0 4px 10px var(--gold-glow))}
.end-metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.em{
  background:var(--surface3);
  border-radius:var(--r);
  padding:12px 8px;
  text-align:center;
}
.em-v{
  display:block;
  font-family:var(--font);
  font-size:1.2rem;
  font-weight:900;
  letter-spacing:-.04em;
}
.em-k{
  display:block;
  font-size:.6rem;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--faint);
  margin-top:3px;
}
.end-body{padding:0 14px calc(var(--safe-bottom) + 20px)}
.unlock-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  margin-bottom:8px;
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.uc-icon{
  width:38px;height:38px;
  border-radius:12px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  flex:0 0 38px;
}
.uc-body{min-width:0;flex:1}
.uc-k{font-size:.62rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:2px;font-family:var(--font)}
.uc-v{font-family:var(--font);font-weight:800;font-size:.9rem;letter-spacing:-.02em;margin-bottom:2px}
.uc-t{font-size:.75rem;color:var(--muted);line-height:1.3}
.end-actions{display:grid;gap:8px;margin-top:8px}

/* Toast */
.toast{
  position:fixed;
  left:50%;bottom:calc(var(--safe-bottom) + var(--tabbar) + 14px);
  transform:translate(-50%,20px);
  background:var(--text);
  color:var(--bg);
  padding:12px 18px;
  border-radius:var(--r);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:200;
  opacity:0;
  transition:all .25s cubic-bezier(.16,1,.3,1);
  white-space:nowrap;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast-t{font-family:var(--font);font-weight:900;font-size:.9rem}
.toast-s{font-size:.75rem;opacity:.75;margin-top:2px}

/* Particles */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;
  width:8px;height:8px;
  border-radius:999px;
  animation:pfloat 900ms ease-out forwards;
}
@keyframes pfloat{
  from{transform:translateY(0) scale(1);opacity:.9}
  to{transform:translateY(-120px) translateX(var(--px)) scale(.1);opacity:0}
}

/* Career result chip */
.career-result-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  border-radius:999px;
  font-family:var(--font);
  font-size:.85rem;
  font-weight:900;
}

.perfect-burst.warn{background:linear-gradient(135deg, color-mix(in srgb,var(--warn) 84%, white 16%) 0%, color-mix(in srgb,var(--gold) 74%, white 26%) 100%)}

.perfect-burst::before,
.perfect-burst::after{
  content:'';
  position:absolute;
  inset:-10px;
  border-radius:inherit;
  border:1px solid rgba(255,255,255,.16);
  opacity:0;
}
.perfect-burst.show::before{animation:perfectRing 900ms ease-out forwards}
.perfect-burst.show::after{animation:perfectRing 900ms ease-out 90ms forwards}
.question-card.perfect-pop{animation:questionPerfect 520ms ease-out}
@keyframes perfectBurstIn{
  0%{opacity:0;transform:translate(-50%,18px) scale(.82)}
  18%{opacity:1;transform:translate(-50%,-6px) scale(1.04)}
  62%{opacity:1;transform:translate(-50%,-14px) scale(1)}
  100%{opacity:0;transform:translate(-50%,-28px) scale(.98)}
}
@keyframes perfectRing{
  0%{opacity:.34;transform:scale(.92)}
  100%{opacity:0;transform:scale(1.22)}
}
@keyframes questionPerfect{
  0%{transform:scale(1)}
  30%{transform:scale(1.014)}
  100%{transform:scale(1)}
}

function primeFx(){
  const Ctx=window.AudioContext||window.webkitAudioContext;
  if(!Ctx)return;
  try{FX.ctx=FX.ctx||new Ctx();if(FX.ctx.state==='suspended')FX.ctx.resume();FX.primed=true;}catch(e){}
}
function tone(freq=440,duration=.08,type='sine',volume=.03,start=0){
  primeFx();
  const ctx=FX.ctx;
  if(!ctx)return;
  try{
    const now=ctx.currentTime+start;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type=type;
    osc.frequency.setValueAtTime(freq,now);
    gain.gain.setValueAtTime(0.0001,now);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001,volume),now+.01);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now+duration+.02);
  }catch(e){}
}
function toneKey(freq,dur,type,vol,start){if(!FX.keysOn)return;tone(freq,dur,type,vol*FX.keysVol,start);}
function toneFB(freq,dur,type,vol,start){if(!FX.feedbackOn)return;tone(freq,dur,type,vol*FX.feedbackVol,start);}
function toneBG(freq,dur,type,vol,start){if(!FX.musicOn)return;tone(freq,dur,type,vol*FX.musicVol,start);}
function getBackingTrackVolume(){
  return Math.min(1,Math.max(0,FX.musicVol*0.25));
}
function stopBackingTrack(){
  if(FX.trackTimer){clearInterval(FX.trackTimer);FX.trackTimer=null;}
  if(FX.bgFadeFrame){cancelAnimationFrame(FX.bgFadeFrame);FX.bgFadeFrame=null;}
  if(FX.bgAudio){FX.bgAudio.pause();FX.bgAudio.currentTime=0;FX.bgAudio.volume=getBackingTrackVolume();}
}
function fadeOutBackingTrack(duration=850){
  if(FX.trackTimer){clearInterval(FX.trackTimer);FX.trackTimer=null;}
  if(FX.bgFadeFrame){cancelAnimationFrame(FX.bgFadeFrame);FX.bgFadeFrame=null;}
  if(!FX.bgAudio)return;
  const audio=FX.bgAudio;
  const startVol=Math.max(0,audio.volume||getBackingTrackVolume());
  if(audio.paused||startVol<=0.001){stopBackingTrack();return;}
  const start=performance.now();
  const step=(now)=>{
    const progress=Math.min(1,(now-start)/duration);
    audio.volume=startVol*(1-progress);
    if(progress<1){
      FX.bgFadeFrame=requestAnimationFrame(step);
      return;
    }
    FX.bgFadeFrame=null;
    audio.pause();
    audio.currentTime=0;
    audio.volume=getBackingTrackVolume();
  };
  FX.bgFadeFrame=requestAnimationFrame(step);
}

function setSoundEnabled(enabled){
  FX.keysOn=!!enabled;
  FX.feedbackOn=!!enabled;
  FX.musicOn=!!enabled;
  S.save.settings.soundOn=!!enabled;
  S.save.settings.keysOn=!!enabled;
  S.save.settings.feedbackOn=!!enabled;
  S.save.settings.musicOn=!!enabled;
  persist();
  renderSettings();
  if(!FX.musicOn)stopBackingTrack();
  else if(S.currentRun)ensureBackingTrack();
}

function isPerfectRoundAnswer(run,out){
  if(!run||out.status!=='correct')return false;
  const cleanAnswer=!run.hintUsed&&!run.revealUsed;
  const fastAnswer=run.remaining >= run.config.timer*0.45;
  return cleanAnswer&&fastAnswer;
}

function detectLang(){try{return (navigator.language||'').toLowerCase().startsWith('nl')?'nl':'intl';}catch(e){return 'intl';}}
function t(key,vars){const pack=I18N[S.lang]||I18N.intl;let v=pack[key];if(v==null)v=I18N.intl[key]??key;if(typeof v!=='string')return v;return v.replace(/\{(\w+)\}/g,(_,k)=>vars&&vars[k]!=null?vars[k]:'');}
function fmt(n){return new Intl.NumberFormat(S.lang==='nl'?'nl-NL':'en-US').format(Math.round(Number(n)||0));}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sampleUnique(list,count,usedSet){const pool=shuffle(list.filter(item=>!usedSet.has(qKey(item))));const picked=pool.slice(0,count);picked.forEach(q=>usedSet.add(qKey(q)));if(picked.length<count){const extra=shuffle(list).filter(item=>!picked.includes(item)).slice(0,count-picked.length);return picked.concat(extra);}return picked;}
function qKey(q){return`${q.c||''}|${q.context||''}|${q.a}`;}
function normalize(str){return String(str||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/&/g,' and ').replace(/[''`]/g,'').replace(/[^a-z0-9]+/g,' ').trim();}
function answerOnly(str){return normalize(str).replace(/\s+/g,'');}
function lev(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}}return dp[m][n];}
function xpForLevel(level){let total=0;for(let lv=1;lv<level;lv++){total+=120+Math.floor(lv*22+Math.pow(lv,1.28)*8);}return total;}
function profileLevelFromXP(xp){let lv=1;while(xp>=xpForLevel(lv+1))lv++;return lv;}
function levelProgress(xp){const level=profileLevelFromXP(xp);const prev=xpForLevel(level);const next=xpForLevel(level+1);return{level,current:xp-prev,need:next-prev,pct:((xp-prev)/(next-prev))*100};}
function rankName(level){const names=t('titleRanks');const idx=clamp(Math.floor((level-1)/6),0,names.length-1);return names[idx];}
function totalStars(save){return Object.values(save.career.bestStars||{}).reduce((a,b)=>a+Number(b||0),0);}
function totalClears(save){return Object.values(save.career.bestStars||{}).filter(v=>Number(v||0)>=1).length;}
function owned(id){return (S.save.owned||[]).includes(id);}
function achUnlocked(id){return (S.save.achievements||[]).includes(id);}
function currentTarget(save){for(const lv of CAREER_LEVELS){if((save.career.bestStars[lv.id]||0)<1)return lv;}return CAREER_LEVELS[CAREER_LEVELS.length-1];}
function isUnlocked(save,level){if(level.index===0)return true;const prev=CAREER_LEVELS[level.index-1];return(save.career.bestStars[prev.id]||0)>=1;}
function chapterLvls(chId){return CAREER_LEVELS.filter(l=>l.chapterId===chId);}
function chStars(save,chId){return chapterLvls(chId).reduce((a,l)=>a+(save.career.bestStars[l.id]||0),0);}
function chClears(save,chId){return chapterLvls(chId).filter(l=>(save.career.bestStars[l.id]||0)>=1).length;}
function chPerfect(save,chId){return chapterLvls(chId).every(l=>(save.career.bestStars[l.id]||0)===3);}
function getLevelById(id){return CAREER_LEVELS.find(l=>l.id===id);}
function computeStars(level,correct){if(correct>=level.rounds)return 3;if(correct/level.rounds>=.9)return 2;if(correct>=level.pass)return 1;return 0;}
function scoreForAnswer(status,remaining,penalties){if(status==='correct')return Math.max(20,100+Math.floor(remaining*6)-penalties);if(status==='almost')return Math.max(8,38-penalties);return 0;}
function roundOutcome(question,guess){const answer=answerOnly(question.a);const input=answerOnly(guess);if(!input)return{status:'wrong'};if(input===answer)return{status:'correct'};const distance=lev(input,answer);const near=distance<=Math.max(1,Math.floor(answer.length*.18))||(answer.includes(input)&&input.length>=Math.max(2,answer.length-2));if(near)return{status:'almost'};return{status:'wrong'};}
function buildQuestions(config){const used=new Set();return config.pools.flatMap(spec=>{let source=[];if(spec.pool==='quotes'){const quoteSource=S.lang==='nl'?NL_QUOTE_BANK:QUOTE_BANK;source=quoteSource.filter(q=>{const d=Number(q.d||1);if(spec.minDiff&&d<spec.minDiff)return false;if(spec.maxDiff&&d>spec.maxDiff)return false;return true;});}else if(spec.pool==='football'){source=FOOTBALL_MODE_DATA.slice();}else if(spec.pool==='trivia'){source=TRIVIA_MODE_DATA.slice();}return sampleUnique(source,spec.count,used).map(q=>({...q,pool:spec.pool,prompt:q.c,context:q.context||'',hint:q.h||''}));}).slice(0,config.rounds);}
function levelDifficulty(level){const diffs=level.pools.map(s=>s.maxDiff||1);const avg=diffs.reduce((a,b)=>a+b,0)/diffs.length;if(avg<1.6)return S.lang==='nl'?'Licht':'Light';if(avg<2.5)return S.lang==='nl'?'Gemengd':'Mixed';return 'Hard';}
function canBuy(item){const level=profileLevelFromXP(S.save.profileXP);const stars=totalStars(S.save);return !owned(item.id)&&S.save.ink>=item.cost&&level>=item.reqLevel&&stars>=(item.starReq||0);}

  const container=document.createElement('div');

    }else{
      btn.className='action-btn dim';btn.textContent=t('locked');btn.disabled=true;
    }
    action.appendChild(btn);container.appendChild(li);
  });
});}

function tickTimer(){clearInterval(S.currentRun.timer);updateTimerUI();S.currentRun.timer=setInterval(()=>{if(S.currentRun.paused)return;S.currentRun.remaining-=0.1;if(S.currentRun.remaining<=0){S.currentRun.remaining=0;updateTimerUI();clearInterval(S.currentRun.timer);if(!S.currentRun.answered)finishRound('','timeout');return;}updateTimerUI();},100);}
function updateTimerUI(){const run=S.currentRun;if(!run)return;const rem=Math.ceil(run.remaining);const pct=clamp((run.remaining/run.config.timer)*100,0,100);const num=document.getElementById('timerNum');num.textContent=`${rem}s`;num.classList.toggle('warn',pct<=45&&pct>18);num.classList.toggle('bad',pct<=18);const fill=document.getElementById('timerFill');fill.style.width=`${pct}%`;fill.style.background=pct<=18?'linear-gradient(90deg,var(--bad),var(--warn))':pct<=45?'linear-gradient(90deg,var(--warn),var(--accent))':'linear-gradient(90deg,var(--good),var(--accent))';}
function useHint(){const run=S.currentRun;if(run.hintUsed||run.answered||run.config.noHint)return;run.hintUsed=true;run.hintPenalty=20;const q=run.questions[run.index];const ans=String(q.a);const firstLetter=ans.replace(/\s/g,'')[0]?.toUpperCase()||'?';const wordCount=ans.trim().split(/\s+/).length;const parts=[];if(q.h)parts.push(q.h);parts.push((S.lang==='nl'?'Begint met':'Starts with')+`: ${firstLetter}`);if(wordCount>1)parts.push((S.lang==='nl'?`${wordCount} woorden`:`${wordCount} words`));document.getElementById('hintArea').className='helper-area show good';document.getElementById('hintArea').textContent=parts.join(' · ');renderGameShell();}
function revealLetter(){const run=S.currentRun;if(run.revealUsed||run.answered||run.config.noReveal)return;const answer=String(run.questions[run.index].a);const available=[...answer].map((ch,idx)=>({ch,idx})).filter(x=>x.ch!==' '&&normalize(x.ch)&&!run.revealedIndices.has(x.idx));if(!available.length)return;const pick=available[Math.floor(Math.random()*available.length)];run.revealedIndices.add(pick.idx);run.revealUsed=true;run.revealPenalty=15;renderAnswerStrip(run.questions[run.index]);document.getElementById('hintArea').className='helper-area show warn';document.getElementById('hintArea').textContent=S.lang==='nl'?'Eén letter vrijgespeeld.':'One letter revealed.';renderGameShell();}
function finishRound(rawGuess,forcedStatus){const run=S.currentRun;if(run.answered)return;run.answered=true;clearInterval(run.timer);const q=run.questions[run.index];const out=forcedStatus==='timeout'?{status:'timeout'}:roundOutcome(q,rawGuess);const penalties=run.hintPenalty+run.revealPenalty;const scoreGain=scoreForAnswer(out.status,run.remaining,penalties);run.score+=scoreGain;if(out.status==='correct'){run.correct++;run.streak++;}else if(out.status==='almost'){run.almost++;run.streak=0;}else{run.wrong++;run.streak=0;}run.bestStreak=Math.max(run.bestStreak,run.streak);run.results[run.index]={status:out.status,guess:rawGuess,answer:q.a,scoreGain};document.getElementById('gameScore').textContent=fmt(run.score);
if(run.mode==='survival'){
  if(out.status==='correct'){run.survivalRound=(run.survivalRound||0)+1;run.survivalAlmost=0;}
  else if(out.status==='almost'){run.survivalAlmost=(run.survivalAlmost||0)+1;run.survivalRound=(run.survivalRound||0)+1;if(run.survivalAlmost>=2){run.survivalAlive=false;}}
  else{run.survivalAlive=false;}
  renderGameShell();
  const fb=document.getElementById('feedbackArea');fb.className='helper-area';fb.textContent='';
  renderAnswerStrip(q,true,out.status);
  if(out.status==='correct'){playFx('correct');pulseResult((S.lang==='nl'?'Goed':'Correct')+` · Ronde ${run.survivalRound}`,'good');}
  else if(out.status==='almost'){playFx('almost');pulseResult((S.lang==='nl'?'Bijna':'Almost')+(run.survivalAlmost>=2?' — Game over!':' — nog 1 kans'),'warn');}
  else{playFx('wrong');pulseResult(S.lang==='nl'?'Fout — Game over!':'Wrong — Game over!','bad');}
  syncSubmitButton();
  if(!run.survivalAlive){
    setTimeout(()=>{
      // wrap up
      run.questions=run.questions.slice(0,run.index+1);
      finishRun();
    },1400);
  }
  return;
}
renderGameShell();const fb=document.getElementById('feedbackArea');fb.className='helper-area';fb.textContent='';renderAnswerStrip(q,true,out.status);if(out.status==='correct'){playFx('correct');if(isPerfectRoundAnswer(run,out)){pulsePerfect(S.lang==='nl'?'Perfect!':'Perfect!');playFx('perfect');}else{pulseResult((S.lang==='nl'?'Goed':'Correct')+(scoreGain?` · +${scoreGain}`:''),'good');}}else if(out.status==='almost'){playFx('almost');pulseResult((S.lang==='nl'?'Bijna':'Almost')+(scoreGain?` · +${scoreGain}`:''),'warn');}else if(out.status==='timeout'){playFx('timeout');pulseResult(S.lang==='nl'?'Tijd om':'Time up','bad');}else{playFx('wrong');pulseResult(S.lang==='nl'?'Fout':'Wrong','bad');}syncSubmitButton();}
function nextRound(){const run=S.currentRun;
if(run.mode==='survival'){
  if(!run.survivalAlive){finishRun();return;}
  // Add more questions if running low
  if(run.index>=run.questions.length-5){
    const extra=[...NL_QUOTE_BANK,...TRIVIA_MODE_DATA,...FOOTBALL_MODE_DATA,...(S.lang!=='nl'?QUOTE_BANK:[])].sort(()=>Math.random()-.5).slice(0,30).map(q=>({...q,pool:'quotes',prompt:q.c,context:q.context||'',hint:q.h||''}));
    run.questions=[...run.questions,...extra];
  }
  run.index++;S.kbInput='';openQuestion();return;
}
if(run.index>=run.questions.length-1){finishRun();return;}run.index++;S.kbInput='';openQuestion();}
function finishRun(){fadeOutBackingTrack(850);clearInterval(S.currentRun.timer);const run=S.currentRun;const beforeLevel=profileLevelFromXP(S.save.profileXP);const beforeStars=totalStars(S.save);const sv=S.save;sv.totalGames+=1;sv.bestStreak=Math.max(sv.bestStreak,run.bestStreak);sv.stats.totalCorrect+=run.correct;sv.stats.totalAlmost+=run.almost;sv.stats.totalWrong+=run.wrong;sv.stats.totalRounds+=run.questions.length;sv.stats.totalScore+=run.score;if(run.correct===run.questions.length)sv.stats.totalPerfectRuns+=1;sv.stats.modes[run.mode]=(sv.stats.modes[run.mode]||0)+1;
if(run.mode==='survival'){
  const rounds=run.survivalRound||0;
  if(!sv.stats.survivalBest||rounds>sv.stats.survivalBest)sv.stats.survivalBest=rounds;
  const xpGain=Math.round(40+rounds*8);
  const inkGain=Math.round(20+rounds*4);
  sv.profileXP+=xpGain;sv.ink+=inkGain;
  const afterLevel=profileLevelFromXP(sv.profileXP);const afterStars=totalStars(sv);
  const achievements=evaluateAchs();const newShopItems=newlyAvailable(beforeLevel,afterLevel,beforeStars,afterStars);
  persist();
  S.endCtx={run,starsEarned:0,passed:true,xpGain,inkGain,nextUnlocked:null,achievements,newShopItems,isSurvival:true,survivalRounds:rounds};
  renderEndScreen();document.getElementById('gameScreen').classList.remove('show');document.getElementById('endScreen').classList.add('show');return;
}
let starsEarned=0,passed=false,xpGain=0,inkGain=0,nextUnlocked=null;if(run.mode==='career'){const level=run.config;starsEarned=computeStars(level,run.correct);passed=starsEarned>=1;const priorBest=sv.career.bestStars[level.id]||0;if(starsEarned>priorBest)sv.career.bestStars[level.id]=starsEarned;sv.career.bestCorrect[level.id]=Math.max(sv.career.bestCorrect[level.id]||0,run.correct);sv.career.bestPct[level.id]=Math.max(sv.career.bestPct[level.id]||0,Math.round((run.correct/level.rounds)*100));sv.career.attempts[level.id]=(sv.career.attempts[level.id]||0)+1;if(run.correct===run.questions.length)sv.stats.totalCareerPerfectRuns+=1;const performance=run.correct/level.rounds;const baseXP=level.rewardXP;const baseInk=level.rewardInk;xpGain=Math.round(baseXP*(passed?(0.72+performance*0.48):(0.28+performance*0.22)));inkGain=Math.round(baseInk*(passed?(0.72+performance*0.4):(0.25+performance*0.2)));if(starsEarned===3){xpGain+=26;inkGain+=18;}if(passed&&priorBest<1){playFx('levelClear');const next=CAREER_LEVELS[level.index+1];if(next)nextUnlocked=next;sv.career.lastFocus=next?next.id:level.id;}else{sv.career.lastFocus=level.id;}}else{const mode=MODE_DEFS[run.mode];const perf=run.correct/mode.rounds;xpGain=Math.round((mode.rounds*8+run.correct*12+run.almost*4)*(0.7+perf*0.5));inkGain=Math.round((mode.rounds*4+run.correct*7+run.almost*2)*(0.7+perf*0.35));if(run.mode==='endless'){xpGain+=30;inkGain+=18;}if(run.mode==='blitz'){xpGain+=10;inkGain+=6;}}sv.profileXP+=xpGain;sv.ink+=inkGain;const afterLevel=profileLevelFromXP(sv.profileXP);const afterStars=totalStars(sv);const achievements=evaluateAchs();const newShopItems=newlyAvailable(beforeLevel,afterLevel,beforeStars,afterStars);persist();S.endCtx={run,starsEarned,passed,xpGain,inkGain,nextUnlocked,achievements,newShopItems};renderEndScreen();document.getElementById('gameScreen').classList.remove('show');document.getElementById('endScreen').classList.add('show');}
function spawnParticles(container,count){container.innerHTML='';for(let i=0;i<count;i++){const dot=document.createElement('div');dot.className='particle';dot.style.left=`${15+Math.random()*70}%`;dot.style.bottom=`${10+Math.random()*18}%`;dot.style.background=['var(--gold)','var(--accent)','var(--purple)'][i%3];dot.style.width=dot.style.height=`${6+Math.random()*6}px`;dot.style.setProperty('--px',`${Math.round(-40+Math.random()*80)}px`);dot.style.animationDelay=`${Math.random()*150}ms`;container.appendChild(dot);}}
function renderEndScreen(){const ctx=S.endCtx;const{run,starsEarned,passed,xpGain,inkGain,nextUnlocked,achievements,newShopItems}=ctx;document.getElementById('endModeLabel').textContent=run.mode==='career'?t('careerMode'):t(MODE_DEFS[run.mode].labelKey);
if(ctx.isSurvival){
  const rounds=ctx.survivalRounds||0;
  document.getElementById('endEyebrow').textContent=S.lang==='nl'?'Survival':'Survival';
  document.getElementById('endTitle').textContent=rounds>=50?(S.lang==='nl'?'Fenomenaal':'Phenomenal'):rounds>=25?(S.lang==='nl'?'Indrukwekkend':'Impressive'):rounds>=10?(S.lang==='nl'?'Goed gedaan':'Well done'):(S.lang==='nl'?'Game over':'Game over');
  document.getElementById('endSub').textContent=(S.lang==='nl'?`Je haalde ronde ${rounds}.`:`You reached round ${rounds}.`);
  document.getElementById('endStars').innerHTML='';
  document.getElementById('endCorrect').textContent=`${rounds} ${S.lang==='nl'?'rondes':'rounds'}`;
  document.getElementById('endXP').textContent=`+${fmt(xpGain)}`;
  document.getElementById('endInk').textContent=`+${fmt(inkGain)}`;
  const stack=document.getElementById('unlockStack');stack.innerHTML='';
  const cards=[];
  achievements.forEach(id=>{const m=ACHIEVEMENTS.find(a=>a.id===id);if(m)cards.push({icon:m.icon,k:t('achievementUnlocked'),v:m.label[S.lang],t:m.desc[S.lang]});});
  if(!cards.length)cards.push({icon:'💀',k:S.lang==='nl'?'Verdiend':'Earned',v:`${S.lang==='nl'?'Ronde':'Round'} ${rounds}`,t:S.lang==='nl'?'Probeer verder te komen.':'Try to go further.'});
  cards.forEach(card=>{const div=document.createElement('div');div.className='unlock-card';div.innerHTML=`<div class="uc-icon">${card.icon}</div><div class="uc-body"><div class="uc-k">${card.k}</div><div class="uc-v">${card.v}</div><div class="uc-t">${card.t}</div></div>`;stack.appendChild(div);});
  document.getElementById('btnEndPrimary').textContent=(S.lang==='nl'?'Opnieuw':'Try again')+' →';
  document.getElementById('btnEndSecondary').textContent=S.lang==='nl'?'Home':'Home';
  document.getElementById('btnEndTertiary').textContent=S.lang==='nl'?'Shop':'Shop';
  document.getElementById('btnEndPrimary').onclick=()=>{document.getElementById('endScreen').classList.remove('show');startRun('survival');};
  document.getElementById('btnEndSecondary').onclick=()=>{document.getElementById('endScreen').classList.remove('show');switchTab('homePanel');renderHome();};
  document.getElementById('btnEndTertiary').onclick=()=>{document.getElementById('endScreen').classList.remove('show');switchTab('shopPanel');};
  renderTopBar();return;
}
if(run.mode==='career'){document.getElementById('endEyebrow').textContent=`${run.config.chapterName[S.lang]} · ${t('level')} ${run.config.no}`;document.getElementById('endTitle').textContent=passed?(starsEarned===3?(S.lang==='nl'?'Perfect potje':'Perfect run'):starsEarned===2?(S.lang==='nl'?'Sterke clear':'Strong clear'):(S.lang==='nl'?'Level gehaald':'Level cleared')):(S.lang==='nl'?'Net niet':'Not quite');document.getElementById('endSub').textContent=passed?(starsEarned===3?(S.lang==='nl'?'Perfect. Alles klikte.':'Perfect. Everything clicked.'):starsEarned===2?t('almostPerfect'):t('successFeels')):t('failureStillCounts');const starsEl=document.getElementById('endStars');starsEl.innerHTML='';for(let i=0;i<3;i++){const sp=document.createElement('div');sp.className='es';sp.textContent='★';if(i<starsEarned)setTimeout(()=>{sp.classList.add('on');},i*200);starsEl.appendChild(sp);}if(starsEarned>=2)spawnParticles(document.getElementById('endParticles'),starsEarned===3?20:12);}else{document.getElementById('endEyebrow').textContent=t(MODE_DEFS[run.mode].labelKey);document.getElementById('endTitle').textContent=run.correct===run.questions.length?(S.lang==='nl'?'Schoon potje':'Clean run'):run.correct>=Math.ceil(run.questions.length*.7)?(S.lang==='nl'?'Sterke run':'Strong run'):(S.lang==='nl'?'Nog een keer':'Run it back');document.getElementById('endSub').textContent=S.lang==='nl'?'XP en inkt zijn binnen.':'XP and Ink banked.';document.getElementById('endStars').innerHTML='';}document.getElementById('endCorrect').textContent=`${run.correct}/${run.questions.length}`;document.getElementById('endXP').textContent=`+${fmt(xpGain)}`;document.getElementById('endInk').textContent=`+${fmt(inkGain)}`;const stack=document.getElementById('unlockStack');stack.innerHTML='';const cards=[];if(run.mode==='career'&&nextUnlocked)cards.push({icon:'🗺️',k:t('rewardUnlocked'),v:t('levelUnlocked'),t:nextUnlocked.title[S.lang]});achievements.forEach(id=>{const m=ACHIEVEMENTS.find(a=>a.id===id);if(m)cards.push({icon:m.icon,k:t('achievementUnlocked'),v:m.label[S.lang],t:m.desc[S.lang]});});newShopItems.forEach(item=>cards.push({icon:item.icon,k:t('available'),v:item.label[S.lang],t:item.desc[S.lang]}));if(!cards.length)cards.push({icon:'✦',k:t('earned'),v:run.mode==='career'?t('starsExplain'):t('earned'),t:S.lang==='nl'?'Goed gespeeld.':'Well played.'});cards.forEach(card=>{const div=document.createElement('div');div.className='unlock-card';div.innerHTML=`<div class="uc-icon">${card.icon}</div><div class="uc-body"><div class="uc-k">${card.k}</div><div class="uc-v">${card.v}</div><div class="uc-t">${card.t}</div></div>`;stack.appendChild(div);});if(run.mode==='career'){document.getElementById('btnEndPrimary').textContent=passed&&nextUnlocked?`${t('nextLevel')} →`:`${t('retry')} →`;document.getElementById('btnEndSecondary').textContent=t('continueMap');document.getElementById('btnEndTertiary').textContent=t('map');}else{document.getElementById('btnEndPrimary').textContent=t(MODE_DEFS[run.mode].labelKey)+' →';document.getElementById('btnEndSecondary').textContent=t('backHome');document.getElementById('btnEndTertiary').textContent=t('shopTitle');}renderTopBar();}
function pauseGame(){if(!S.currentRun)return;S.currentRun.paused=true;stopBackingTrack();document.getElementById('pauseOverlay').classList.add('show');}
function resumeGame(){if(!S.currentRun)return;S.currentRun.paused=false;document.getElementById('pauseOverlay').classList.remove('show');ensureBackingTrack();}
function restartGame(){if(!S.currentRun)return;const mode=S.currentRun.mode;const lvlId=mode==='career'?S.currentRun.config.id:null;document.getElementById('pauseOverlay').classList.remove('show');startRun(mode,lvlId);}
function quitGame(){stopBackingTrack();clearInterval(S.currentRun?.timer);document.getElementById('pauseOverlay').classList.remove('show');document.getElementById('gameScreen').classList.remove('show');S.currentRun=null;switchTab('homePanel');renderHome();}

// ══════════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════════
function bindEvents(){// Tabs
['pointerdown','touchstart','keydown'].forEach(evt=>document.addEventListener(evt,primeFx,{once:true,passive:true}));
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
// Lang
document.getElementById('langChoiceIntl').addEventListener('click',()=>setLanguage('intl'));
document.getElementById('langChoiceNl').addEventListener('click',()=>setLanguage('nl'));
/* Audio toggle buttons */
document.getElementById('audioToggleKeys').addEventListener('click',()=>{FX.keysOn=!FX.keysOn;S.save.settings.keysOn=FX.keysOn;persist();renderSettings();});
document.getElementById('audioToggleFeedback').addEventListener('click',()=>{FX.feedbackOn=!FX.feedbackOn;S.save.settings.feedbackOn=FX.feedbackOn;persist();renderSettings();});
document.getElementById('audioToggleMusic').addEventListener('click',()=>{FX.musicOn=!FX.musicOn;S.save.settings.musicOn=FX.musicOn;persist();renderSettings();if(!FX.musicOn){stopBackingTrack();}else if(S.currentRun){ensureBackingTrack();}});
/* Audio volume sliders */
document.getElementById('audioVolKeys').addEventListener('input',e=>{FX.keysVol=Number(e.target.value)/100;S.save.settings.keysVol=Number(e.target.value);document.getElementById('audioVolKeysVal').textContent=e.target.value+'%';persist();});
document.getElementById('audioVolFeedback').addEventListener('input',e=>{FX.feedbackVol=Number(e.target.value)/100;S.save.settings.feedbackVol=Number(e.target.value);document.getElementById('audioVolFeedbackVal').textContent=e.target.value+'%';persist();});
document.getElementById('audioVolMusic').addEventListener('input',e=>{FX.musicVol=Number(e.target.value)/100;S.save.settings.musicVol=Number(e.target.value);document.getElementById('audioVolMusicVal').textContent=e.target.value+'%';if(FX.bgAudio)FX.bgAudio.volume=getBackingTrackVolume();persist();});
// Focus play btn
document.getElementById('focusPlayBtn').addEventListener('click',()=>{const target=currentTarget(S.save);if(isUnlocked(S.save,target))startRun('career',target.id);});
// Level sheet
document.getElementById('btnCloseLevelSheet').addEventListener('click',closeLevelSheet);document.getElementById('levelOverlay').addEventListener('click',e=>{if(e.target.id==='levelOverlay')closeLevelSheet();});document.getElementById('btnSheetPlay').addEventListener('click',()=>startRun('career',S.selectedLevelId));document.getElementById('btnSheetRetry').addEventListener('click',()=>startRun('career',S.selectedLevelId));
// Game
document.getElementById('btnPauseGame').addEventListener('click',pauseGame);document.getElementById('btnHint').addEventListener('click',useHint);document.getElementById('btnReveal').addEventListener('click',revealLetter);document.getElementById('btnNextRound').addEventListener('click',nextRound);
// Pause
document.getElementById('btnClosePause').addEventListener('click',resumeGame);document.getElementById('btnResumeGame').addEventListener('click',resumeGame);document.getElementById('btnRestartGame').addEventListener('click',restartGame);document.getElementById('btnQuitGame').addEventListener('click',quitGame);
// End
document.getElementById('btnEndHome').addEventListener('click',()=>{document.getElementById('endScreen').classList.remove('show');switchTab('homePanel');renderHome();});
document.getElementById('btnEndPrimary').addEventListener('click',()=>{const ctx=S.endCtx;if(!ctx)return;if(ctx.run.mode==='career'){if(ctx.passed&&ctx.nextUnlocked)startRun('career',ctx.nextUnlocked.id);else startRun('career',ctx.run.config.id);}else{startRun(ctx.run.mode);}});
document.getElementById('btnEndSecondary').addEventListener('click',()=>{document.getElementById('endScreen').classList.remove('show');if(S.endCtx?.run.mode==='career'){switchTab('homePanel');renderHome();}else{switchTab('homePanel');renderHome();}});
document.getElementById('btnEndTertiary').addEventListener('click',()=>{document.getElementById('endScreen').classList.remove('show');if(S.endCtx?.run.mode==='career'){switchTab('homePanel');renderHome();}else switchTab('shopPanel');});
// Visibility
document.addEventListener('visibilitychange',()=>{if(document.hidden&&S.currentRun&&!S.currentRun.paused)S.currentRun.paused=true;});}

function playIntro(){
  const splash=document.getElementById('introSplash');
  if(!splash)return;
  document.body.classList.add('intro-lock');
  setTimeout(()=>splash.classList.add('hide'),2500);
  setTimeout(()=>{
    splash.remove();
    document.body.classList.remove('intro-lock');
    switchTab('homePanel');
  },3200);
}

function init(){S.shopOpen={};S.achOpen={};S.save=loadSave();persist();S.lang=S.save.lang||detectLang();
/* Load per-channel audio settings */
const ss=S.save.settings;
FX.keysOn=ss.keysOn!==false;
FX.keysVol=Math.min(1,Math.max(0,(ss.keysVol!=null?ss.keysVol:85)/100));
FX.feedbackOn=ss.feedbackOn!==false;
FX.feedbackVol=Math.min(1,Math.max(0,(ss.feedbackVol!=null?ss.feedbackVol:100)/100));
FX.musicOn=ss.musicOn!==false;
FX.musicVol=Math.min(1,Math.max(0,(ss.musicVol!=null?ss.musicVol:25)/100));
applyTheme();applyI18n();buildKeyboard();bindEvents();renderTopBar();renderHome();renderSettings();updateBadges();switchTab('homePanel');playIntro();}
init();
